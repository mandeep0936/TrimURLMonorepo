services:
  - type: web
    name: trimurlmonorepo
    runtime: node
    plan: free
    # Build/start run from the repo root so the pnpm workspace resolves.
    # pnpm is preinstalled on Render; corepack enable fails (read-only /usr/bin).
    # --prod=false forces devDependencies (typescript/tsc) to install even when NODE_ENV=production.
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @trim/api build
    startCommand: pnpm --filter @trim/api start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://trimurlmonorepo.onrender.com
      - key: CLIENT_URL
        value: https://trim-url-monorepo-web.vercel.app
      # PORT is provided automatically by Render.
      # Set MONGODB_URI in the Render dashboard (e.g. a MongoDB Atlas connection string).
      - key: MONGODB_URI
        sync: false
